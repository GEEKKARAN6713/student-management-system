<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${formTitle})}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="container main-content">
    <div class="page-header">
        <h1 th:text="${formTitle}">Student Form</h1>
        <p th:if="${isEdit}">Update student details below.</p>
        <p th:unless="${isEdit}">Fill in the form to register a new student.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${formAction}" th:object="${student}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName">First name</label>
                        <input id="firstName" type="text" th:field="*{firstName}" required maxlength="50"/>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last name</label>
                        <input id="lastName" type="text" th:field="*{lastName}" required maxlength="50"/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" th:field="*{email}" required maxlength="100"/>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone (optional)</label>
                        <input id="phone" type="tel" th:field="*{phone}" maxlength="20"/>
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Date of birth</label>
                        <input id="dateOfBirth" type="date" th:field="*{dateOfBirth}" required/>
                    </div>
                    <div class="form-group">
                        <label for="course">Course</label>
                        <input id="course" type="text" th:field="*{course}" required maxlength="80"/>
                    </div>
                    <div class="form-group">
                        <label for="gpa">GPA (0.00 – 4.00)</label>
                        <input id="gpa" type="number" step="0.01" min="0" max="4" th:field="*{gpa}" required/>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" th:field="*{status}">
                            <option th:each="st : ${T(com.sms.model.Student.StudentStatus).values()}"
                                    th:value="${st}" th:text="${st}"></option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Save changes' : 'Register student'">Submit</button>
                    <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
