<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle} + ' | Student Management System'">SMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:fragment="header" class="site-header">
    <div class="container header-inner">
        <a class="brand" th:href="@{/}">
            <span class="brand-icon">SMS</span>
            <span class="brand-text">Student Management</span>
        </a>
        <nav class="nav">
            <a th:href="@{/students}">All Students</a>
            <a class="btn btn-primary btn-sm" th:href="@{/students/new}">+ Add Student</a>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="site-footer">
    <div class="container">
        <p>Java · JDBC · MySQL · Spring Boot</p>
    </div>
</footer>
</body>
</html>
