# Optional: deploy on Render.com (https://render.com)
# 1. Connect your GitHub repo
# 2. Render reads this file for a Blueprint deploy
# 3. Add a MySQL database separately (Render does not host MySQL — use Railway or Aiven for DB)

services:
  - type: web
    name: student-management-system
    runtime: docker
    plan: free
    healthCheckPath: /students
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: PORT
        value: "8080"
